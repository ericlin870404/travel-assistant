<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊助手 - 行程詳情</title>

    <link rel="manifest" href="manifest.json?v=0317">
    <meta name="theme-color" content="#0891b2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .active-nav { color: #0891b2; border-top: 3px solid #0891b2; }
        .active-food-tab { background-color: #0891b2 !important; color: white !important; }
        .glass-header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .expand-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .expanded .expand-content {
            max-height: 800px;
            opacity: 1;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="text-slate-800 pb-24">

    <header class="glass-header text-white p-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center">
                <button onclick="handleHomeClick()" class="flex items-center gap-1 text-cyan-400 focus:outline-none">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    <span class="font-bold text-sm">Home</span>
                </button>
            </div>
        </div>
    </header>

    <main id="app-content" class="max-w-2xl mx-auto p-4 fade-in">
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50 px-2 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="max-w-2xl mx-auto flex justify-around">
            <button onclick="router('schedule')" id="nav-schedule" class="flex flex-col items-center py-3 px-2 transition-all text-slate-400">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="text-[9px] mt-1 font-bold">行程表</span>
            </button>
            <button onclick="router('hotel')" id="nav-hotel" class="flex flex-col items-center py-3 px-2 transition-all text-slate-400">
                <i data-lucide="bed-double" class="w-5 h-5"></i>
                <span class="text-[9px] mt-1 font-bold">住宿</span>
            </button>
            <button onclick="router('transport')" id="nav-transport" class="flex flex-col items-center py-3 px-2 transition-all text-slate-400">
                <i data-lucide="car" class="w-5 h-5"></i>
                <span class="text-[9px] mt-1 font-bold">交通</span>
            </button>
            <button onclick="router('food')" id="nav-food" class="flex flex-col items-center py-3 px-2 transition-all text-slate-400">
                <i data-lucide="utensils" class="w-5 h-5"></i>
                <span class="text-[9px] mt-1 font-bold">美食</span>
            </button>
            <button onclick="router('attraction')" id="nav-attraction" class="flex flex-col items-center py-3 px-2 transition-all text-slate-400">
                <i data-lucide="palmtree" class="w-5 h-5"></i>
                <span class="text-[9px] mt-1 font-bold">景點</span>
            </button>
        </div>
    </nav>

    <script>
        // --- 核心數據結構 (住宿資料已更新為台東行程) ---
        const TRAVEL_DATA = {
            hotels: [
                { 
                    name: "原來宿", 
                    room_type: "舶來雙人套房", 
                    check_in: "15:00 (自行入住)", check_out: "11:00", 
                    breakfast: false, 
                    phone: "0928814320",
                    map: "https://maps.app.goo.gl/HLFejG25Bhiw8qQE7", 
                    booking: "#"
                },
                { 
                    name: "響樂池上電梯民宿", 
                    room_type: "加大雙人床房-附陽台", 
                    check_in: "15:00", check_out: "11:00", 
                    breakfast: true, 
                    phone: "0919007104",
                    map: "https://maps.app.goo.gl/LrY3nmpmgKrWtaCM7", 
                    booking: "https://secure.booking.com/confirmation.zh-tw.html?label=gen173nr-10CBcoggI46AdIM1gEaOcBiAEBmAEzuAEXyAEM2AED6AEB-AEBiAIBqAIBuALtqZDOBsACAdICJDBiMTJhMjQ5LWU2YWUtNGQ1MC04NGUxLWYwODg1ZGNmMTYzZNgCAeACAQ&sid=0ce4a2f6f685df99411d129c02d43b3c&aid=304142&auth_key=0mo2VNkaGnQC0rah&source=mytrips#manage-booking-quick-action"
                },
                { 
                    name: "加路蘭部落民宿", 
                    room_type: "園景雙人房", 
                    check_in: "15:00", check_out: "11:00", 
                    breakfast: true, 
                    phone: "0916826906",
                    map: "https://maps.app.goo.gl/r9RgkT6cnN4A6BpK6", 
                    booking: "https://secure.booking.com/confirmation.zh-tw.html?label=gen173nr-10CBcoggI46AdIM1gEaOcBiAEBmAEzuAEXyAEM2AED6AEB-AEBiAIBqAIBuALtqZDOBsACAdICJDBiMTJhMjQ5LWU2YWUtNGQ1MC04NGUxLWYwODg1ZGNmMTYzZNgCAeACAQ&sid=0ce4a2f6f685df99411d129c02d43b3c&aid=304142&auth_key=xIhG5AEMrepEkk3V&source=mytrips"
                },
                { 
                    name: "台東小野柳營區", 
                    room_type: "有頂營位+帳篷", 
                    check_in: "15:00", check_out: "11:00", 
                    breakfast: false, 
                    phone: "0919607617",
                    map: "https://maps.app.goo.gl/Yt6FmAGNu1pjM3Cv7", 
                    booking: "#"
                }
            ],
            transport: [
                { type: "airplane", name: "長榮航空", icon: "plane", from: "TPE 桃園", to: "MNL 馬尼拉", time_start: "10:15", time_end: "12:55", no: "BR277", terminal: "第二航廈" },
                { type: "car", name: "預約租車", icon: "car", from: "Panglao 機場", to: "飯店", time_start: "18:30", time_end: "19:00", no: "接機服務", terminal: "入境出口" }
            ],
            schedule: [
                { date: "01/17 (六)", items: [{ id: "it1", time: "08:00", title: "桃園機場集合", desc: "T1 報到", photo: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=600&q=80" }] },
                { date: "01/18 (日)", items: [{ id: "it2", time: "09:30", title: "巧克力山", desc: "Chocolate Hills Complex", map: "#" }] },
                { date: "01/19 (一)", items: [{ id: "it3", time: "06:30", title: "前往帕米拉坎島", desc: "KKday 集合報到", map: "#" }] },
                { date: "01/20 (二)", items: [{ id: "it4", time: "11:00", title: "潛水: Napaling Reef", desc: "沙丁魚風暴", map: "#" }] }
            ],
            restaurants: {
                main: [{ name: "BARWOO", desc: "亞洲融合料理", map: "#" }],
                others: [{ name: "MIST", desc: "森林系咖啡廳", map: "#" }]
            },
            attractions: [
                { category: "水上活動", name: "Napaling Reef", desc: "浮潛聖地", map: "#" },
                { category: "自然景觀", name: "巧克力山", desc: "邦勞奇景", map: "#" }
            ]
        };

        let currentFoodCat = 'main';
        let activeScheduleDay = 0;
        let currentPage = 'home';

        function handleHomeClick() {
            if (currentPage === 'home') { window.location.href = 'index.html'; } 
            else { router('home'); }
        }

        function router(page) {
            currentPage = page;
            const content = document.getElementById('app-content');
            content.innerHTML = '';
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('active-nav');
                b.classList.add('text-slate-400');
            });
            if(page !== 'home') {
                const activeBtn = document.getElementById(`nav-${page}`);
                if(activeBtn) { activeBtn.classList.add('active-nav'); activeBtn.classList.remove('text-slate-400'); }
            }
            switch(page) {
                case 'home': renderHome(); break;
                case 'schedule': renderSchedule(); break;
                case 'hotel': renderHotel(); break;
                case 'transport': renderTransport(); break;
                case 'food': renderFood(); break;
                case 'attraction': renderAttraction(); break;
                case 'accounting': 
                    document.getElementById('app-content').innerHTML = `<div class="py-20 text-center text-slate-300 italic">旅遊記帳預留區</div>`;
                    break;
            }
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        function renderHome() {
            const container = document.getElementById('app-content');
            container.innerHTML = `
                <div class="space-y-10 py-4">
                    <div class="px-2"><h2 class="text-3xl font-black text-slate-800 tracking-tighter">Eric 的行程預覽</h2><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Travel Dashboard</p></div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="router('schedule')" class="aspect-square bg-white rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center justify-center gap-4 active:scale-95 transition-all"><div class="p-4 bg-cyan-50 rounded-2xl text-cyan-600"><i data-lucide="calendar" class="w-8 h-8"></i></div><span class="font-bold text-slate-700 text-sm">行程表</span></button>
                        <button onclick="router('hotel')" class="aspect-square bg-white rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center justify-center gap-4 active:scale-95 transition-all"><div class="p-4 bg-amber-50 rounded-2xl text-amber-600"><i data-lucide="bed-double" class="w-8 h-8"></i></div><span class="font-bold text-slate-700 text-sm">住宿資訊</span></button>
                        <button onclick="router('transport')" class="aspect-square bg-white rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center justify-center gap-4 active:scale-95 transition-all"><div class="p-4 bg-indigo-50 rounded-2xl text-indigo-600"><i data-lucide="car" class="w-8 h-8"></i></div><span class="font-bold text-slate-700 text-sm">交通方式</span></button>
                        <button onclick="router('food')" class="aspect-square bg-white rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center justify-center gap-4 active:scale-95 transition-all"><div class="p-4 bg-rose-50 rounded-2xl text-rose-600"><i data-lucide="utensils" class="w-8 h-8"></i></div><span class="font-bold text-slate-700 text-sm">美食清單</span></button>
                        <button onclick="router('attraction')" class="aspect-square bg-white rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center justify-center gap-4 active:scale-95 transition-all"><div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600"><i data-lucide="palmtree" class="w-8 h-8"></i></div><span class="font-bold text-slate-700 text-sm">景點攻略</span></button>
                        <button onclick="router('accounting')" class="aspect-square bg-white rounded-[2rem] border border-slate-100 shadow-sm flex flex-col items-center justify-center gap-4 active:scale-95 transition-all"><div class="p-4 bg-[#f5f5f4] rounded-2xl text-[#78716c]"><i data-lucide="receipt" class="w-8 h-8"></i></div><span class="font-bold text-slate-700 text-sm">旅遊記帳</span></button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderSchedule() {
            const container = document.getElementById('app-content');
            const dayTabsHtml = TRAVEL_DATA.schedule.map((day, index) => `
                <button onclick="setScheduleDay(${index})" class="flex-none px-6 py-3 rounded-2xl transition-all ${activeScheduleDay === index ? 'bg-cyan-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}">
                    <span class="block text-[10px] font-black tracking-tighter uppercase ${activeScheduleDay === index ? 'text-cyan-100' : 'text-slate-300'}">Day ${index + 1}</span>
                    <span class="block text-xs font-bold mt-0.5">${day.date.split(' ')[0]}</span>
                </button>`).join('');

            const currentDayItems = TRAVEL_DATA.schedule[activeScheduleDay].items;
            const itemsHtml = currentDayItems.map(item => `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm transition-all duration-300" onclick="this.classList.toggle('expanded')">
                    <div class="flex items-center justify-between"><div class="flex items-center gap-4 flex-1"><div class="w-12 text-center flex-none"><span class="text-xs font-mono font-bold text-cyan-700">${item.time}</span></div><div><h3 class="text-sm font-bold text-slate-800">${item.title}</h3><p class="text-[10px] text-slate-400 mt-0.5">${item.desc}</p></div></div>
                    ${item.map ? `<button onclick="event.stopPropagation(); window.open('${item.map}', '_blank')" class="p-2.5 bg-slate-50 text-cyan-600 rounded-xl border border-slate-100"><i data-lucide="map-pin" class="w-4 h-4"></i></button>` : ''}</div>
                    <div class="expand-content">${item.photo ? `<div class="rounded-2xl overflow-hidden h-48 mt-4"><img src="${item.photo}" class="w-full h-full object-cover"></div>` : `<div class="h-40 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-300 mt-4"><i data-lucide="camera" class="w-8 h-8"></i></div>`}</div>
                </div>`).join('');

            container.innerHTML = `<div class="space-y-6 relative pb-20"><div class="flex overflow-x-auto gap-3 py-2 px-1 no-scrollbar sticky top-[108px] z-20">${dayTabsHtml}</div><div id="schedule-container" class="space-y-3">${itemsHtml}</div>
                <div class="fixed bottom-28 right-6 z-40 flex flex-col gap-3"><button class="p-4 rounded-full shadow-2xl" style="background-color: #fbbf24;"><i data-lucide="pencil" class="w-6 h-6 text-white"></i></button><button class="p-4 rounded-full shadow-2xl" style="background-color: #fbbf24;"><i data-lucide="plus" class="w-6 h-6 text-white"></i></button></div></div>`;
            lucide.createIcons();
        }

        function renderHotel() {
            const container = document.getElementById('app-content');
            const itemsHtml = TRAVEL_DATA.hotels.map(hotel => `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm mb-6 fade-in">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h3 class="text-lg font-black text-slate-800 leading-tight">${hotel.name}</h3>
                            <p class="text-xs text-amber-600 font-bold mt-1 inline-flex items-center gap-1"><i data-lucide="home" class="w-3 h-3"></i> ${hotel.room_type}</p>
                        </div>
                        ${hotel.breakfast ? `<span class="bg-emerald-50 text-emerald-600 text-[10px] font-black px-2 py-1 rounded-lg flex items-center gap-1"><i data-lucide="coffee" class="w-3 h-3"></i> 含早餐</span>` : ''}
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Check In</span><span class="text-sm font-black text-slate-700">${hotel.check_in}</span></div>
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Check Out</span><span class="text-sm font-black text-slate-700">${hotel.check_out}</span></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.open('${hotel.map}', '_blank')" class="flex-1 bg-cyan-50 text-cyan-600 py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-cyan-600 hover:text-white transition-all"><i data-lucide="map-pin" class="w-4 h-4"></i><span class="text-xs font-bold">導覽</span></button>
                        <button onclick="window.open('${hotel.booking}', '_blank')" class="flex-1 bg-indigo-50 text-indigo-600 py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-indigo-600 hover:text-white transition-all"><i data-lucide="external-link" class="w-4 h-4"></i><span class="text-xs font-bold">訂房資訊</span></button>
                        ${hotel.phone ? `
                            <a href="tel:${hotel.phone}" class="w-12 bg-slate-100 text-slate-500 rounded-2xl flex items-center justify-center hover:bg-slate-800 hover:text-white transition-all">
                                <i data-lucide="phone" class="w-5 h-5"></i>
                            </a>
                        ` : ''}
                    </div>
                </div>`).join('');
            container.innerHTML = `<div class="space-y-4 pb-20"><div class="px-2 mb-4"><h2 class="text-2xl font-black text-slate-800 tracking-tight">住宿資訊</h2></div>${itemsHtml}</div>`;
            lucide.createIcons();
        }

        function renderTransport() {
            const container = document.getElementById('app-content');
            const itemsHtml = TRAVEL_DATA.transport.map(item => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm transition-all duration-300 mb-3" onclick="this.classList.toggle('expanded')">
                    <div class="flex items-center justify-between"><div class="flex items-center gap-4"><div class="p-3 bg-indigo-50 text-indigo-600 rounded-2xl"><i data-lucide="${item.icon}" class="w-6 h-6"></i></div><div><h3 class="font-bold text-slate-800 text-sm">${item.name}</h3><p class="text-[10px] text-slate-400 mt-0.5 uppercase tracking-widest font-bold">${item.from} → ${item.to}</p></div></div><i data-lucide="chevron-down" class="w-4 h-4 text-slate-300"></i></div>
                    <div class="expand-content border-t border-slate-50 pt-4">
                        <div class="grid grid-cols-2 gap-4 mb-3">
                            <div class="bg-slate-50 p-3 rounded-2xl"><span class="text-[9px] text-slate-400 block mb-1 uppercase font-black">Departure</span><span class="text-sm font-black text-indigo-600">${item.time_start}</span></div>
                            <div class="bg-slate-50 p-3 rounded-2xl"><span class="text-[9px] text-slate-400 block mb-1 uppercase font-black">Arrival</span><span class="text-sm font-black text-slate-700">${item.time_end}</span></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-900 p-3 rounded-2xl text-white"><span class="text-[9px] opacity-50 block mb-1 uppercase font-black">車次 / 班機</span><span class="text-xs font-bold tracking-tight">${item.no}</span></div>
                            <div class="bg-indigo-700 p-3 rounded-2xl text-white"><span class="text-[9px] opacity-50 block mb-1 uppercase font-black">月台 / 航廈</span><span class="text-xs font-bold tracking-tight">${item.terminal}</span></div>
                        </div>
                    </div>
                </div>`).join('');
            container.innerHTML = `<div class="space-y-4 pb-20"><div class="px-2 mb-4"><h2 class="text-2xl font-black text-slate-800 tracking-tight">交通方式</h2></div>${itemsHtml}</div>`;
            lucide.createIcons();
        }

        function renderFood() {
            const container = document.getElementById('app-content');
            const items = TRAVEL_DATA.restaurants[currentFoodCat];
            container.innerHTML = `
                <div class="space-y-6 relative pb-20">
                    <div class="flex bg-slate-200 p-1 rounded-2xl">
                        <button onclick="setFoodCat('main')" class="flex-1 py-2 text-xs font-bold rounded-xl ${currentFoodCat === 'main' ? 'active-food-tab shadow-sm' : 'text-slate-500'}">正餐</button>
                        <button onclick="setFoodCat('others')" class="flex-1 py-2 text-xs font-bold rounded-xl ${currentFoodCat === 'others' ? 'active-food-tab shadow-sm' : 'text-slate-500'}">其他</button>
                    </div>
                    <div class="space-y-3">
                        ${items.map(f => `
                            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                                <div><h3 class="font-bold text-slate-800 text-sm">${f.name}</h3><p class="text-[10px] text-slate-400 mt-1">${f.desc}</p></div>
                                <button onclick="window.open('${f.map}', '_blank')" class="bg-cyan-600 text-white p-3 rounded-2xl shadow-lg hover:bg-cyan-700 transition-all">
                                    <i data-lucide="map-pin" class="w-4 h-4"></i>
                                </button>
                            </div>`).join('')}
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderAttraction() {
            const container = document.getElementById('app-content');
            const categories = ["水上活動", "自然景觀", "藝文參觀", "其他"];
            let html = `<div class="space-y-8 pb-20"><div class="px-2 mb-4"><h2 class="text-2xl font-black text-slate-800 tracking-tight">景點攻略</h2></div>`;
            categories.forEach(cat => {
                const items = TRAVEL_DATA.attractions.filter(attr => attr.category === cat);
                if (items.length > 0) {
                    html += `<div class="space-y-4"><h3 class="text-xs font-black text-emerald-600 uppercase tracking-widest px-2 flex items-center gap-2"><span class="w-1 h-4 bg-emerald-500 rounded-full"></span>${cat}</h3><div class="space-y-3">
                        ${items.map(item => `<div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between"><div><h4 class="font-bold text-slate-800 text-sm">${item.name}</h4><p class="text-[10px] text-slate-400 mt-1">${item.desc}</p></div></div>`).join('')}</div></div>`;
                }
            });
            container.innerHTML = html + `</div>`;
            lucide.createIcons();
        }

        function setScheduleDay(index) { activeScheduleDay = index; renderSchedule(); }
        function setFoodCat(cat) { currentFoodCat = cat; renderFood(); }
        window.onload = () => { router('home'); }
    </script>
</body>
</html>
