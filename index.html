<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊助手 - 總覽</title>
    <link rel="manifest" href="manifest.json?v=0318">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { background: #f1f5f9; font-family: 'Inter', 'Noto Sans TC', sans-serif; }

        /* --- 歡迎動畫 --- */
        .welcome-screen {
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-svg { transform: rotate(-90deg); }
        .loader-circle {
            fill: none; stroke: #fbbf24; stroke-width: 4; stroke-linecap: round;
            stroke-dasharray: 345; stroke-dashoffset: 345;
            animation: progress 1.5s ease-in-out forwards;
        }
        @keyframes progress { to { stroke-dashoffset: 0; } }
        .welcome-text {
            position: absolute; color: white; font-weight: bold;
            opacity: 0; transform: translateY(10px);
            animation: textFadeUp 0.8s ease-out 0.3s forwards;
        }
        @keyframes textFadeUp { to { opacity: 1; transform: translateY(0); } }
        .welcome-fade-out { opacity: 0; transform: scale(1.1); pointer-events: none; }

        /* --- 收合區塊核心動畫 --- */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .accordion-item.active .accordion-content {
            max-height: 600px;
            opacity: 1;
            margin-top: 1.5rem;
        }
        .chevron-icon { transition: transform 0.4s; }
        .accordion-item.active .chevron-icon { transform: rotate(180deg); }

        /* --- 側邊邊框顏色 --- */
        .card-history { border-left: 6px solid #64748b; } 
        .card-ongoing { border-left: 6px solid #0891b2; } 
        .card-create { border-left: 6px solid #fbbf24; }

        .accordion-item.active {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="pb-10">

    <div id="welcome" class="welcome-screen">
        <div class="relative flex items-center justify-center">
            <svg class="loader-svg" width="140" height="140">
                <circle class="loader-circle" cx="70" cy="70" r="55"></circle>
            </svg>
            <h1 class="welcome-text text-xl">歡迎回來</h1>
        </div>
    </div>

    <header class="p-8">
        <h1 class="text-3xl font-black tracking-tight text-slate-800">旅遊助手</h1>
        <p class="text-slate-500 text-sm mt-1">準備好去哪冒險了嗎？</p>
    </header>

    <main class="px-6 space-y-6">
        
        <div class="accordion-item card-history bg-white rounded-[2rem] p-6 border border-slate-100 transition-all cursor-pointer" onclick="toggleAccordion(this)">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-slate-100 rounded-2xl text-slate-600 shadow-inner">
                        <i data-lucide="archive" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="font-extrabold text-slate-700 text-lg">歷史行程</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Past Memories</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="p-2 rounded-full bg-slate-50 text-slate-300">
                        <i data-lucide="chevron-down" class="chevron-icon w-5 h-5"></i>
                    </div>
                </div>
            </div>
            <div class="accordion-content">
                <div class="text-center py-10 bg-slate-50/30 border-2 border-dashed border-slate-100 rounded-[2rem]">
                    <i data-lucide="history" class="w-8 h-8 text-slate-200 mx-auto mb-2"></i>
                    <p class="text-sm text-slate-400 font-medium">暫無歷史行程</p>
                </div>
            </div>
        </div>

        <div class="accordion-item card-ongoing bg-white rounded-[2rem] p-6 border border-slate-100 transition-all cursor-pointer" onclick="toggleAccordion(this)">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-cyan-50 rounded-2xl text-cyan-600 shadow-inner">
                        <i data-lucide="compass" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="font-extrabold text-slate-700 text-lg">規劃中行程</h3>
                        <p class="text-[10px] text-cyan-500 font-bold uppercase tracking-wider">Current Planning</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="p-2 rounded-full bg-cyan-50 text-cyan-200">
                        <i data-lucide="chevron-down" class="chevron-icon w-5 h-5"></i>
                    </div>
                </div>
            </div>
            
            <div class="accordion-content">
                <div class="space-y-3">
                    <a href="detail.html?id=taitung-birthday" class="flex items-center p-5 bg-cyan-50/50 rounded-2xl border border-cyan-100 hover:bg-cyan-100/50 transition-colors">
                        
                        <span class="text-3xl flex-none">🐕‍🦺</span>

                        <div class="flex-1 ml-4 min-w-0">
                            <h4 class="font-black text-slate-700 text-lg leading-tight tracking-tight truncate">
                                臭寶寶生日台東旅行
                            </h4>
                            <p class="text-[10px] text-slate-400 font-medium mt-2">
                                2026/04/02 ~ 2026/04/06
                            </p>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <div class="accordion-item card-create bg-[#f59e0b] rounded-[2rem] p-6 border border-none transition-all cursor-pointer shadow-lg shadow-amber-200/50" onclick="toggleAccordion(this)">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-white/20 rounded-2xl text-white">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 class="font-extrabold text-white text-lg" style="text-shadow: 0 1px 2px rgba(0,0,0,0.15);">建立新行程</h3>
                        <p class="text-[10px] text-white/90 font-bold uppercase tracking-wider" style="text-shadow: 0 1px 1px rgba(0,0,0,0.1);">New Adventure</p>
                    </div>
                </div>
                <div class="p-2 rounded-full bg-white/20 text-white">
                    <i data-lucide="chevron-down" class="chevron-icon w-5 h-5"></i>
                </div>
            </div>
            
            <div class="accordion-content" onclick="event.stopPropagation()">
                <div class="space-y-4 bg-black/5 p-4 rounded-3xl mt-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-white ml-1 tracking-widest">TRIP NAME</label>
                        <input type="text" placeholder="準備去哪冒險？" class="w-full p-4 bg-white/30 border border-white/20 rounded-2xl text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/40">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-white ml-1 tracking-widest">START</label>
                            <input type="date" class="w-full p-3 bg-white/30 border border-white/20 rounded-2xl text-white text-xs">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-white ml-1 tracking-widest">END</label>
                            <input type="date" class="w-full p-3 bg-white/30 border border-white/20 rounded-2xl text-white text-xs">
                        </div>
                    </div>
                    <button class="w-full bg-[#334155] text-white p-4 rounded-2xl font-black text-sm shadow-lg shadow-amber-600/20 active:scale-95 transition-transform">
                        完成
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function toggleAccordion(element) {
            document.querySelectorAll('.accordion-item').forEach(item => {
               if(item !== element) item.classList.remove('active');
            });
            element.classList.toggle('active');
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const welcome = document.getElementById('welcome');
                welcome.classList.add('welcome-fade-out');
                setTimeout(() => welcome.remove(), 800);
            }, 2300);
        });
    </script>
</body>
</html>
